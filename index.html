<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>NJ ZIP Code Explorer</title>

  <style>
    body {
      font-family: system-ui, -apple-system, Arial;
      background: #ffffff;
      margin: 0;
      padding: 24px;
      color: #111;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 14px;
    }

    input {
      padding: 8px 10px;
      margin-bottom: 12px;
      width: 100%;
      max-width: 320px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .table-wrapper {
      border: 1px solid #e6e6e6;
      border-radius: 8px;
      overflow-x: auto;
      background: #fff;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 14px;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #eee;
      text-align: left;
      white-space: nowrap;
    }

    th {
      background: #fafafa;
      font-weight: 600;
    }

    tr:hover {
      background: #f7f7f7;
    }

    .note {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Best Places In NJ To Start A Small Business </h2>

  <div class="subtitle">
    Source: <a href="https://www.ondeck.com" target="_blank">OnDeck analysis</a>
  </div>

  <input type="text" id="search" placeholder="Search ZIP or county..." />

  <div class="table-wrapper">
    <table id="table">
      <thead>
        <tr>
          <th>Rank</th>
          <th>ZIP Code</th>
          <th>County</th>
          <th>Overall Score</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>


  <div class="note"> Source: OnDeck analysis <span style="color:#999;">(small business lending data)</span>
  — <a href="https://www.ondeck.com" target="_blank">ondeck.com</a> </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>

let data = [];

// =========================================================
// LOAD CSV
// =========================================================
fetch("./NJZipCodes.csv")
  .then(res => {
    if (!res.ok) throw new Error("CSV not found");
    return res.text();
  })
  .then(text => {

    const lines = text.split("\n");
    const cleaned = lines.slice(1).join("\n");

    const parsed = Papa.parse(cleaned, {
      header: true,
      skipEmptyLines: true
    }).data;

    data = parsed; // no filtering unless you want NJ subsets

    renderTable(data);
  })
  .catch(err => {
    console.error(err);
    document.body.innerHTML =
      "<h3 style='color:red'>NJ CSV failed to load</h3>";
  });


// =========================================================
// RENDER
// =========================================================
function renderTable(rows) {
  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  rows.forEach(r => {
    tbody.innerHTML += `
      <tr>
        <td>${r.Rank || ""}</td>
        <td>${r["ZIP Code"] || ""}</td>
        <td>${r.County || ""}</td>
        <td>${r["Overall Score"] || ""}</td>
      </tr>
    `;
  });
}


// =========================================================
// SEARCH
// =========================================================
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  const filtered = data.filter(r =>
    JSON.stringify(r).toLowerCase().includes(val)
  );

  renderTable(filtered);
});

</script>

</body>
</html>
